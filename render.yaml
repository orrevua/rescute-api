services:
  - type: web
    name: rescute-api
    runtime: python
    buildCommand: poetry install --no-root && poetry run alembic upgrade head
    startCommand: poetry run uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: AI_PROVIDER_KEY
        sync: false
      - key: AI_MODEL
        value: gpt-4o-mini
      - key: AI_BASE_URL
        value: https://api.openai.com/v1
      - key: ENVIRONMENT
        value: production
      - key: PYTHON_VERSION
        value: "3.12"
